name: "HexaVigil CI - Windows & Web Export"

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

env:
  GODOT_VERSION: 4.6.2
  EXPORT_NAME: HexaVigil
  ITCH_TARGET: cloudtide/hexavigil:web
  PROJECT_PATH: .

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Windows Desktop" "$EXPORT_DIR/windows/$EXPORT_NAME.exe"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows

  export-web:
    name: Web Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Web Build
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Web" "$EXPORT_DIR/web/index.html"
      - name: Install Web Packaging Tools
        run: |
          apt-get update
          apt-get install -y curl unzip zip
      - name: Package Web Build
        run: |
          cd build/web
          zip -r ../web.zip .
      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web.zip
      - name: Install Butler
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -fsSL --retry 3 --retry-delay 5 -o butler.zip https://github.com/itchio/butler/releases/download/v15.27.0/butler-linux-amd64.zip
          unzip -o butler.zip -d /usr/local/bin
          chmod +x /usr/local/bin/butler
          butler -V
      - name: Publish Web Build to itch.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          if [ -z "$BUTLER_API_KEY" ]; then
            echo "::error::Missing BUTLER_API_KEY repository secret."
            exit 1
          fi

          butler push build/web.zip "$ITCH_TARGET" --userversion "${GITHUB_SHA::7}"
