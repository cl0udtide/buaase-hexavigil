name: Update Beta Burndown

on:
  workflow_dispatch:
  schedule:
    - cron: "59 15 25-31 5 *"
    - cron: "59 15 1-8 6 *"

permissions:
  contents: write
  issues: write

jobs:
  update:
    name: Regenerate beta burndown chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout burndown branch
        uses: actions/checkout@v4
        with:
          ref: beta-burndown
          path: beta-burndown
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check active Beta burndown window
        id: window
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime as dt

          tz = dt.timezone(dt.timedelta(hours=8))
          today = dt.datetime.now(dt.timezone.utc).astimezone(tz).date()
          active = dt.date(2026, 5, 25) <= today <= dt.date(2026, 6, 8)
          print(f"active={'true' if active else 'false'}")
          print(f"today={today.isoformat()}")
          PY

      - name: Install dependencies
        if: steps.window.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: beta-burndown
        run: python -m pip install -r requirements-alpha-burndown.txt

      - name: Compute Beta burndown as-of date
        if: steps.window.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        id: asof
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime as dt
          import os

          tz = dt.timezone(dt.timedelta(hours=8))
          as_of = dt.datetime.now(dt.timezone.utc).astimezone(tz).date()
          if os.environ["EVENT_NAME"] != "schedule":
              as_of = min(as_of, dt.date(2026, 6, 8))
          print(f"as_of_date={as_of.isoformat()}")
          PY

      - name: Regenerate Beta burndown
        if: steps.window.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: beta-burndown
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python beta_burndown.py --sync --as-of-date ${{ steps.asof.outputs.as_of_date }}

      - name: Commit and push chart updates
        if: steps.window.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: beta-burndown
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md beta_burndown.py requirements-alpha-burndown.txt burndowns/
          if git diff --cached --quiet; then
            echo "No burndown changes to commit."
          else
            git commit -m "docs: update Beta burndown chart"
            git push origin beta-burndown
          fi
